<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça seu registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form action="" id="form" class="form">
            <h2>Faça seu cadastro</h2>
            <div class="form-fields">
                <label for="username">Seu usuário</label>
                <input type="text" id="username" name="username" class="username" placeholder="Seu usuário">
                <span class="error-message">Campo inválido por algum motivo qualquer</span>
            </div>
             <div class="form-fields">
                <label for="email">Seu email</label>
                <input type="email" id="email" name="email" class="email" placeholder="Seu email">
                <span class="error-message">Campo inválido por algum motivo qualquer</span>
            </div>
             <div class="form-fields">
                <label for="password">Sua senha</label>
                <input type="password" id="password" name="password" class="password" placeholder="Sua senha">
                <span class="error-message">Campo inválido por algum motivo qualquer</span>
            </div>
             <div class="form-fields">
                <label for="confirm-password">Confirme sua senha</label>
                <input type="password" id="confirm-password" name="confirm-password" class="confirm-password" placeholder="Confirme sua senha">
                <span class="error-message">Campo inválido por algum motivo qualquer</span>
            </div>
            <div class="form-fields">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </div>
    <script src="assets/js/bundle.js"></script>
</body>
</html>
